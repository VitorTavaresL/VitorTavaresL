name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: Platane/snk@v3
        with:
          github_user_name: VitorTavaresL
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark
      - uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update snake animation"
          add: "dist/"
